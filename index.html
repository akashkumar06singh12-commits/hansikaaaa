<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Hansika 💖</title>

<style>
body{
  margin:0;
  text-align:center;
  font-family:'Comic Sans MS',cursive;
  color:white;
  overflow:hidden;
}

/* BACKGROUND SLIDER */
#bgSlider{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}
#bgSlider img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 2s;
  filter: blur(4px);
}

/* DARK OVERLAY */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:-1;
}

h1{margin-top:70px;}
p{font-size:18px;}

.btn{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  margin:10px;
  cursor:pointer;
}

.portrait{
  width:220px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

#step2,#step3,#finalButtons,#finalYesPage{
  display:none;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<!-- BACKGROUND IMAGES -->
<div id="bgSlider">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
  <img src="photo4.jpg">
</div>

<canvas id="confetti"></canvas>

<h1>Hey Hansika ☺</h1>

<!-- STEP 1 -->
<div id="step1">
  <p>I wanted to show you something…</p>
  <input type="password" id="code1" placeholder="Enter code">
  <br><br>
  <button onclick="check1()" class="btn">Unlock 🔓</button>
  <p id="err1"></p>
</div>

<!-- STEP 2 -->
<div id="step2">
  <img src="hansika.jpg" class="portrait">
  <p>Do you remember the date I gave you this? ☺</p>

  <input type="password" id="code2" placeholder="Enter date">
  <br><br>
  <button onclick="check2()" class="btn">Unlock 🔓</button>
  <p id="err2"></p>
</div>

<!-- STEP 3 -->
<div id="step3">
  <p id="typingText"></p>
</div>

<!-- FINAL BUTTONS -->
<div id="finalButtons">
  <h2>Do you feel the same? ☺</h2>
  <button id="yesBtn" class="btn" style="background:green;color:white;">Yes 😊</button>
  <button id="noBtn" class="btn" style="background:red;color:white;position:absolute;">No 😢</button>
</div>

<!-- FINAL YES -->
<div id="finalYesPage">
  <h1>That means a lot to me ☺</h1>
  <p>You just made my day 💖</p>
</div>

<!-- SONG -->
<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

// BACKGROUND SLIDER
const slides=document.querySelectorAll("#bgSlider img");
let index=0;
function showSlide(){
  slides.forEach((img,i)=>{
    img.style.opacity=(i===index)?"1":"0";
  });
  index=(index+1)%slides.length;
}
setInterval(showSlide,3000);
showSlide();

// STEP 1
function check1(){
  if(code1.value==="0203"){
    step1.style.display="none";
    step2.style.display="block";
  } else {
    err1.innerText="Wrong code ☺";
  }
}

// STEP 2
function check2(){
  if(code2.value==="2203"){
    step2.style.display="none";
    step3.style.display="block";
    startTyping();
  } else {
    err2.innerText="Think again ☺";
  }
}

// TYPING
const message=`I don't really know how to say this,
I've never said it before...

but I felt like I should be honest.

I like talking to you,
I like you ☺

no pressure`;

let i=0;
function startTyping(){
  function type(){
    if(i<message.length){
      typingText.innerHTML+=message.charAt(i);
      i++;
      setTimeout(type,40);
    } else {
      setTimeout(()=>finalButtons.style.display="block",1000);
    }
  }
  type();
}

// NO BUTTON
noBtn.addEventListener("mouseover",()=>{
  noBtn.style.left=Math.random()*window.innerWidth+"px";
  noBtn.style.top=Math.random()*window.innerHeight+"px";
});

// CONFETTI
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];
function createConfetti(){
  for(let i=0;i<150;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      size:Math.random()*8+2,
      speed:Math.random()*3+1
    });
  }
}
function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y+=p.speed;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(drawConfetti);
}

// YES CLICK
yesBtn.onclick=()=>{
  step3.style.display="none";
  finalButtons.style.display="none";
  finalYesPage.style.display="block";

  createConfetti();
  drawConfetti();

  song.play().catch(()=>alert("Tap screen for music 🎵"));
};
</script>

</body>
</html>
